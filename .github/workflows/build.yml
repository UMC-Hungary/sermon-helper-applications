name: Build and Release

on:
  # Run tests on every pull request targeting main
  pull_request:
    branches:
      - main
  # Build and release on push to main or version tags
  push:
    branches:
      - main
      - v2-postgres-rebuild
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
      - '.gitignore'
  # Manual trigger
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  # ──────────────────────────────────────────────
  # E2E tests — must pass before any build starts
  # Runs on Linux only; builds the headless test_server binary,
  # starts it, runs pnpm test:e2e, then shuts it down.
  # ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-22.04
    name: E2E Tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: Linux-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: Linux-pnpm-store-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          shared-key: test-server

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build test server
        run: pnpm build:test-server

      - name: Run E2E tests
        # globalSetup (e2e/global-setup.ts) spawns and tears down the server automatically.
        env:
          TAURI_TEST_TOKEN: ${{ secrets.TAURI_AUTH_TOKEN }}
        run: pnpm test:e2e

  # ──────────────────────────────────────────────
  # Desktop builds (macOS, Windows, Linux)
  # ──────────────────────────────────────────────
  build:
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis,msi
            name: Windows-x64

          # macOS ARM (M1/M2/M3)
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg,app
            name: macOS-ARM64

          # macOS Intel (cross-compile from ARM runner)
          - platform: macos-14
            target: x86_64-apple-darwin
            bundles: dmg,app
            name: macOS-Intel

          # Linux
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,rpm,appimage
            name: Linux-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      # Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # Get pnpm store directory for caching
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      # Cache pnpm dependencies
      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # Setup Rust
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache Rust dependencies
      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          shared-key: ${{ matrix.target }}

      # Update version from git tag
      - name: Update version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Updating version to: $VERSION"

          # Update package.json using node
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Update tauri.conf.json using node
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '$VERSION';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

          # Update Cargo.toml (use sed with cross-platform approach)
          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' 's/^version = ".*"/version = "'"$VERSION"'"/' src-tauri/Cargo.toml
          else
            sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' src-tauri/Cargo.toml
          fi

          echo "Updated versions:"
          grep '"version"' package.json
          grep '"version"' src-tauri/tauri.conf.json
          grep '^version' src-tauri/Cargo.toml

      # Install frontend dependencies
      - name: Install frontend dependencies
        run: pnpm install

      # Build the app
      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Sign macOS app
        if: runner.os == 'macOS'
        run: |
          APP_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Signing: $APP_PATH"
            codesign --force --deep --sign - "$APP_PATH"
            echo "Signed successfully"
          fi

      # Rename macOS tarballs to include architecture
      - name: Rename macOS tarballs with architecture
        if: runner.os == 'macOS'
        run: |
          MACOS_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          if [ -d "$MACOS_DIR" ]; then
            # Determine architecture suffix
            if [ "${{ matrix.target }}" = "aarch64-apple-darwin" ]; then
              ARCH="aarch64"
            else
              ARCH="x64"
            fi

            # Rename .app.tar.gz files
            for f in "$MACOS_DIR"/*.app.tar.gz; do
              if [ -f "$f" ]; then
                BASENAME=$(basename "$f" .app.tar.gz)
                NEW_NAME="${BASENAME}_${ARCH}.app.tar.gz"
                mv "$f" "$MACOS_DIR/$NEW_NAME"
                echo "Renamed: $f -> $MACOS_DIR/$NEW_NAME"
              fi
            done

            # Rename .app.tar.gz.sig files
            for f in "$MACOS_DIR"/*.app.tar.gz.sig; do
              if [ -f "$f" ]; then
                BASENAME=$(basename "$f" .app.tar.gz.sig)
                NEW_NAME="${BASENAME}_${ARCH}.app.tar.gz.sig"
                mv "$f" "$MACOS_DIR/$NEW_NAME"
                echo "Renamed: $f -> $MACOS_DIR/$NEW_NAME"
              fi
            done

            ls -la "$MACOS_DIR"
          fi

      # Upload artifacts (for non-tag builds)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage.sig
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # iOS build (client-only, no embedded server)
  # Requires: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
  #           APPLE_PROVISIONING_PROFILE secrets for signed builds.
  # Without those secrets an unsigned simulator/device build is produced.
  #
  # One-time setup: run `pnpm tauri ios init` locally and commit
  # src-tauri/gen/apple/ to the repository.
  # ──────────────────────────────────────────────
  build-ios:
    if: github.event_name != 'pull_request'
    runs-on: macos-latest
    name: Build (iOS)
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: macOS-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: macOS-pnpm-store-

      - name: Setup Rust with iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          shared-key: ios

      - name: Install frontend dependencies
        run: pnpm install

      - name: Update version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '$VERSION';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          sed -i '' 's/^version = ".*"/version = "'"$VERSION"'"/' src-tauri/Cargo.toml

      # Initialize iOS project if it hasn't been committed to the repo yet.
      # Best practice: run `pnpm tauri ios init` locally and commit the result.
      - name: Initialize iOS project (if needed)
        run: |
          if [ ! -d "src-tauri/gen/apple" ]; then
            echo "iOS project not found — running tauri ios init"
            pnpm tauri ios init
          else
            echo "iOS project already present"
          fi

      # Import Apple signing certificate when the secret is configured.
      - name: Import Apple signing certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -k $KEYCHAIN_PATH \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "" $KEYCHAIN_PATH

      # Install provisioning profile when configured.
      - name: Install provisioning profile
        if: env.APPLE_PROVISIONING_PROFILE != ''
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      # iOS requires a real Apple Developer signing identity — xcodebuild cannot
      # produce a device build without one. This step runs only when the signing
      # secrets are configured; without them the job skips the build but still
      # succeeds (the Android debug build covers unsigned mobile compilation).
      - name: Build iOS app
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ] || [ -z "$APPLE_PROVISIONING_PROFILE" ]; then
            echo "Skipping iOS build — APPLE_CERTIFICATE / APPLE_PROVISIONING_PROFILE secrets not configured."
            echo "Add them to enable signed iOS builds."
            exit 0
          fi
          pnpm tauri ios build --export-method ad-hoc

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS
          path: |
            src-tauri/gen/apple/build/**/*.ipa
            src-tauri/gen/apple/build/**/*.app
          if-no-files-found: warn

  # ──────────────────────────────────────────────
  # Android build (client-only, no embedded server)
  # Requires: ANDROID_KEYSTORE, ANDROID_KEYSTORE_PASSWORD,
  #           ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD secrets
  #           for signed release builds.
  #
  # One-time setup: run `pnpm tauri android init` locally and commit
  # src-tauri/gen/android/ to the repository.
  # ──────────────────────────────────────────────
  build-android:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    name: Build (Android)
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: Linux-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: Linux-pnpm-store-

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Setup Rust with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          shared-key: android

      - name: Install frontend dependencies
        run: pnpm install

      - name: Update version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '$VERSION';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' src-tauri/Cargo.toml

      # Initialize Android project if not committed to the repo.
      # Best practice: run `pnpm tauri android init` locally and commit the result.
      - name: Initialize Android project (if needed)
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            echo "Android project not found — running tauri android init"
            pnpm tauri android init
          else
            echo "Android project already present"
          fi

      # Decode keystore for signed release builds.
      - name: Setup Android keystore
        if: env.ANDROID_KEYSTORE != ''
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          echo "$ANDROID_KEYSTORE" | base64 --decode > $RUNNER_TEMP/release.keystore
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> $GITHUB_ENV

      # Signed release build when keystore is available.
      - name: Build Android app (signed release)
        if: env.ANDROID_KEYSTORE != ''
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          pnpm tauri android build \
            --apk \
            -- \
            -Pandroid.injected.signing.store.file="$ANDROID_KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      # Debug (unsigned) build when keystore is not available.
      - name: Build Android app (debug)
        if: env.ANDROID_KEYSTORE == ''
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: pnpm tauri android build --apk --debug

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: warn

  # ──────────────────────────────────────────────
  # Release (version tags only)
  # ──────────────────────────────────────────────
  release:
    needs: [build, build-ios, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Generate latest.json manifest
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="UMC-Hungary/sermon-helper-applications"

          # Read signatures
          WINDOWS_SIG=""
          MACOS_ARM_SIG=""
          MACOS_INTEL_SIG=""
          LINUX_APPIMAGE_SIG=""
          LINUX_DEB_SIG=""

          # Windows NSIS signature
          if [ -f artifacts/Windows-x64/nsis/*.exe.sig ]; then
            WINDOWS_SIG=$(cat artifacts/Windows-x64/nsis/*.exe.sig)
          fi

          # macOS ARM signature (from .app.tar.gz bundle, not dmg)
          if [ -f artifacts/macOS-ARM64/macos/*_aarch64.app.tar.gz.sig ]; then
            MACOS_ARM_SIG=$(cat artifacts/macOS-ARM64/macos/*_aarch64.app.tar.gz.sig)
          fi

          # macOS Intel signature (from .app.tar.gz bundle, not dmg)
          if [ -f artifacts/macOS-Intel/macos/*_x64.app.tar.gz.sig ]; then
            MACOS_INTEL_SIG=$(cat artifacts/macOS-Intel/macos/*_x64.app.tar.gz.sig)
          fi

          # Linux AppImage signature
          if [ -f artifacts/Linux-x64/appimage/*.AppImage.sig ]; then
            LINUX_APPIMAGE_SIG=$(cat artifacts/Linux-x64/appimage/*.AppImage.sig)
          fi

          # Linux deb signature
          if [ -f artifacts/Linux-x64/deb/*.deb.sig ]; then
            LINUX_DEB_SIG=$(cat artifacts/Linux-x64/deb/*.deb.sig)
          fi

          # Get actual filenames
          WINDOWS_EXE=$(basename artifacts/Windows-x64/nsis/*.exe 2>/dev/null | head -1 || echo "")
          MACOS_ARM_APP=$(basename artifacts/macOS-ARM64/macos/*_aarch64.app.tar.gz 2>/dev/null | head -1 || echo "")
          MACOS_INTEL_APP=$(basename artifacts/macOS-Intel/macos/*_x64.app.tar.gz 2>/dev/null | head -1 || echo "")
          LINUX_APPIMAGE=$(basename artifacts/Linux-x64/appimage/*.AppImage 2>/dev/null | head -1 || echo "")

          # Create latest.json
          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "Release v${VERSION}",
            "pub_date": "${DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${WINDOWS_SIG}",
                "url": "https://github.com/${REPO}/releases/download/v${VERSION}/${WINDOWS_EXE}"
              },
              "darwin-aarch64": {
                "signature": "${MACOS_ARM_SIG}",
                "url": "https://github.com/${REPO}/releases/download/v${VERSION}/${MACOS_ARM_APP}"
              },
              "darwin-x86_64": {
                "signature": "${MACOS_INTEL_SIG}",
                "url": "https://github.com/${REPO}/releases/download/v${VERSION}/${MACOS_INTEL_APP}"
              },
              "linux-x86_64": {
                "signature": "${LINUX_APPIMAGE_SIG}",
                "url": "https://github.com/${REPO}/releases/download/v${VERSION}/${LINUX_APPIMAGE}"
              }
            }
          }
          EOF

          cat latest.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          body: |
            ## Installation

            ### Windows
            Download `.exe` (NSIS installer) or `.msi` (Windows Installer).

            ### macOS
            Download the `.dmg` for your architecture:
            - **Apple Silicon (M1/M2/M3)**: `*-aarch64.dmg`
            - **Intel**: `*-x64.dmg`

            **Note:** If macOS shows "app is damaged", run this in Terminal:
            ```bash
            xattr -cr /Applications/sermon-helper-tauri.app
            ```

            ### Linux
            - `.deb` - Debian/Ubuntu
            - `.rpm` - Fedora/RHEL
            - `.AppImage` - Universal (make executable with `chmod +x`)

            ### iOS
            Install via TestFlight or side-load the `.ipa` (requires ad-hoc provisioning).

            ### Android
            Install the `.apk` directly (enable "Install from unknown sources").

          files: |
            latest.json
            artifacts/**/*.exe
            artifacts/**/*.exe.sig
            artifacts/**/*.msi
            artifacts/**/*.msi.sig
