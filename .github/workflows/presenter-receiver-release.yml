name: Presenter Receiver Release

on:
  push:
    tags:
      - 'presenter-receiver-v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            artifact: presenter-receiver-macos-arm64

          - runner: macos-latest
            artifact: presenter-receiver-macos-x86_64
            cargo_target: x86_64-apple-darwin
            brew_prefix: /usr/local

          - runner: ubuntu-22.04
            artifact: presenter-receiver-linux-x86_64

          - runner: ubuntu-24.04-arm
            artifact: presenter-receiver-linux-arm64

    runs-on: ${{ matrix.runner }}
    name: Build (${{ matrix.artifact }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install macOS dependencies (Cairo + Pango via Homebrew)
        if: runner.os == 'macOS'
        run: brew install cairo pango harfbuzz pkg-config

      - name: Install Linux dependencies (Cairo + Pango via apt)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev pkg-config

      - name: Install macOS x86_64 dependencies via x86_64 Homebrew
        if: matrix.brew_prefix != ''
        run: |
          # x86_64 Homebrew is not pre-installed on Apple Silicon runners.
          # Install it at /usr/local via Rosetta, then install x86_64 Cairo/Pango.
          NONINTERACTIVE=1 arch -x86_64 /bin/bash -c \
            "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          arch -x86_64 /usr/local/bin/brew install cairo pango harfbuzz pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.cargo_target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './presenter-receiver -> target'
          shared-key: ${{ matrix.artifact }}

      - name: Build release binary
        working-directory: presenter-receiver
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            if [ -n "${{ matrix.brew_prefix }}" ]; then
              # Cross-compiling to x86_64: point pkg-config at x86_64 Homebrew (/usr/local)
              export PKG_CONFIG_LIBDIR_x86_64_apple_darwin="/usr/local/lib/pkgconfig:/usr/local/share/pkgconfig"
              export PKG_CONFIG_SYSROOT_DIR=/usr/local
              export PKG_CONFIG_ALLOW_CROSS=1
            else
              # Native arm64 build
              export PKG_CONFIG_PATH="$(brew --prefix)/lib/pkgconfig:$(brew --prefix cairo)/lib/pkgconfig:$(brew --prefix pango)/lib/pkgconfig"
            fi
          fi
          if [ -n "${{ matrix.cargo_target }}" ]; then
            cargo build --release --target ${{ matrix.cargo_target }}
          else
            cargo build --release
          fi

      - name: Rename binary with platform suffix
        shell: bash
        run: |
          if [ -n "${{ matrix.cargo_target }}" ]; then
            cp presenter-receiver/target/${{ matrix.cargo_target }}/release/presenter-receiver ${{ matrix.artifact }}
          else
            cp presenter-receiver/target/release/presenter-receiver ${{ matrix.artifact }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: false
          body: |
            Standalone terminal binary that connects to the Sermon Helper WebSocket
            and renders the active presentation slide on-screen.

            - **macOS**: opens a native window (Helvetica Neue, Cairo-rendered)
            - **Linux / Raspberry Pi**: writes directly to the framebuffer (`/dev/fb0`) — no desktop needed

            ### One-line install (auto-detects platform)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/UMC-Hungary/sermon-helper-applications/main/presenter-receiver/install.sh | bash -s -- ws://YOUR_SERVER_IP:3000/ws
            ```

            To install without running immediately:
            ```bash
            curl -fsSL https://raw.githubusercontent.com/UMC-Hungary/sermon-helper-applications/main/presenter-receiver/install.sh | bash
            ```
          files: |
            artifacts/presenter-receiver-macos-arm64/presenter-receiver-macos-arm64
            artifacts/presenter-receiver-macos-x86_64/presenter-receiver-macos-x86_64
            artifacts/presenter-receiver-linux-x86_64/presenter-receiver-linux-x86_64
            artifacts/presenter-receiver-linux-arm64/presenter-receiver-linux-arm64
